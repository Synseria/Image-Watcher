# ============================================================================
# Workflow de Tests et Qualité du Code
# ============================================================================
# Ce workflow réutilisable exécute les tests unitaires, le linter et génère
# un rapport de couverture de code. Il est appelé par d'autres workflows
# (comme ci-cd.yaml) pour centraliser la logique de test.
#
# Fonctionnalités :
# - Linting du code (vérification des règles de style)
# - Tests unitaires avec couverture de code
# - Génération d'un rapport HTML de couverture
# - Publication du rapport sur GitHub Pages (branche master uniquement)
# ============================================================================

name: Tests

# Ce workflow est réutilisable et peut être appelé par d'autres workflows
on:
  workflow_call:

jobs:
  test:
    name: Tests et Lint
    runs-on: ubuntu-latest
    
    steps:
      # -----------------------------------------------------------------------
      # Étape 1 : Récupération du code source
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v6
      
      # -----------------------------------------------------------------------
      # Étape 2 : Configuration de l'environnement Node.js
      # -----------------------------------------------------------------------
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      # -----------------------------------------------------------------------
      # Étape 3 : Installation des dépendances
      # -----------------------------------------------------------------------
      - run: npm ci

      # -----------------------------------------------------------------------
      # Étape 4 : Création du fichier .env.test si nécessaire
      # -----------------------------------------------------------------------
      # Certains tests peuvent nécessiter des variables d'environnement
      # Crée un fichier .env.test vide s'il n'existe pas déjà
      - name: Créer .env.test si manquant
        run: |
          if [ ! -f .env.test ]; then
            echo "Création de .env.test avec les valeurs par défaut"
            touch .env.test
          fi

      # -----------------------------------------------------------------------
      # Étape 5 : Vérification du style de code (Linting)
      # -----------------------------------------------------------------------
      # Exécute ESLint pour vérifier que le code respecte les règles de style
      # et les bonnes pratiques définies dans eslint.config.js
      - name: Lint
        run: npm run lint

      # -----------------------------------------------------------------------
      # Étape 6 : Exécution des tests avec couverture de code
      # -----------------------------------------------------------------------
      # Exécute les tests unitaires avec Vitest et génère un rapport de
      # couverture de code qui indique quelles lignes sont testées
      - name: Tests avec couverture de code
        run: npm run coverage -- --reporter=json --reporter=default --outputFile=test-results.json

      # -----------------------------------------------------------------------
      # Étape 7 : Génération du résumé de couverture
      # -----------------------------------------------------------------------
      # Crée un résumé visible dans l'interface GitHub Actions
      # S'exécute toujours, même si les tests échouent (if: always())
      - name: Résumé de couverture
        if: always()
        run: |
          echo "## 📊 Rapport de Tests et Couverture" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # ===================================================================
          # PARTIE 1 : Résultats des Tests
          # ===================================================================
          if [ -f test-results.json ]; then
            echo "### 🧪 Résultats des Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              
              let totalTests = 0;
              let passedTests = 0;
              let failedTests = 0;
              let skippedTests = 0;
              let duration = 0;
              
              const testFiles = [];
              
              // Parcourir tous les fichiers de test
              if (results.testResults) {
                results.testResults.forEach(file => {
                  const fileName = file.name.replace(process.cwd() + '/', '');
                  const fileTests = file.assertionResults || [];
                  
                  let filePassed = 0;
                  let fileFailed = 0;
                  let fileSkipped = 0;
                  
                  fileTests.forEach(test => {
                    totalTests++;
                    if (test.status === 'passed') {
                      passedTests++;
                      filePassed++;
                    } else if (test.status === 'failed') {
                      failedTests++;
                      fileFailed++;
                    } else if (test.status === 'skipped' || test.status === 'pending') {
                      skippedTests++;
                      fileSkipped++;
                    }
                  });
                  
                  if (fileTests.length > 0) {
                    testFiles.push({
                      name: fileName,
                      total: fileTests.length,
                      passed: filePassed,
                      failed: fileFailed,
                      skipped: fileSkipped,
                      duration: file.endTime - file.startTime
                    });
                  }
                  
                  duration += (file.endTime - file.startTime);
                });
              }
              
              // Résumé global
              const successRate = totalTests > 0 ? ((passedTests / totalTests) * 100).toFixed(1) : '0';
              const statusEmoji = failedTests === 0 ? '✅' : '❌';
              
              console.log(\`\${statusEmoji} **Statut Global** : \${passedTests}/\${totalTests} tests réussis (\${successRate}%)\`);
              console.log('');
              console.log('| Métrique | Valeur |');
              console.log('|----------|--------|');
              console.log(\`| ✅ Réussis | \${passedTests} |\`);
              console.log(\`| ❌ Échoués | \${failedTests} |\`);
              console.log(\`| ⏭️ Ignorés | \${skippedTests} |\`);
              console.log(\`| ⏱️ Durée | \${(duration / 1000).toFixed(2)}s |\`);
              console.log('');
              
              if (testFiles.length > 0) {
                console.log('#### 📁 Détails par Fichier');
                console.log('');
                console.log('| Fichier | Tests | Réussis | Échoués | Ignorés | Durée |');
                console.log('|---------|-------|---------|---------|---------|-------|');
                
                testFiles.forEach(file => {
                  const emoji = file.failed === 0 ? '✅' : '❌';
                  const durationStr = (file.duration / 1000).toFixed(2) + 's';
                  console.log(\`| \${emoji} \${file.name} | \${file.total} | \${file.passed} | \${file.failed} | \${file.skipped} | \${durationStr} |\`);
                });
                
                console.log('');
              }
            " >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Résultats des tests non disponibles**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # ===================================================================
          # PARTIE 2 : Couverture de Code
          # ===================================================================
          if [ -f coverage/coverage-final.json ]; then
            echo "### 📈 Couverture de Code" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extraction des métriques globales
            node -e "
              const fs = require('fs');
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
              
              let totalStatements = 0, coveredStatements = 0;
              let totalBranches = 0, coveredBranches = 0;
              let totalFunctions = 0, coveredFunctions = 0;
              let totalLines = 0, coveredLines = 0;
              
              const fileStats = [];
              
              for (const [file, data] of Object.entries(coverage)) {
                const fileName = file.replace(process.cwd() + '/', '');
                const s = data.s || {}, b = data.b || {}, f = data.f || {};
                
                const stmtTotal = Object.keys(s).length;
                const stmtCovered = Object.values(s).filter(v => v > 0).length;
                const branchTotal = Object.values(b).flat().length;
                const branchCovered = Object.values(b).flat().filter(v => v > 0).length;
                const funcTotal = Object.keys(f).length;
                const funcCovered = Object.values(f).filter(v => v > 0).length;
                const lineTotal = Object.keys(data.statementMap || {}).length;
                const lineCovered = Object.values(s).filter(v => v > 0).length;
                
                totalStatements += stmtTotal;
                coveredStatements += stmtCovered;
                totalBranches += branchTotal;
                coveredBranches += branchCovered;
                totalFunctions += funcTotal;
                coveredFunctions += funcCovered;
                totalLines += lineTotal;
                coveredLines += lineCovered;
                
                const stmtPct = stmtTotal > 0 ? (stmtCovered / stmtTotal * 100).toFixed(2) : '100.00';
                const branchPct = branchTotal > 0 ? (branchCovered / branchTotal * 100).toFixed(2) : '100.00';
                const funcPct = funcTotal > 0 ? (funcCovered / funcTotal * 100).toFixed(2) : '100.00';
                const linePct = lineTotal > 0 ? (lineCovered / lineTotal * 100).toFixed(2) : '100.00';
                
                fileStats.push({ fileName, stmtPct, branchPct, funcPct, linePct });
              }
              
              const globalStmtPct = totalStatements > 0 ? (coveredStatements / totalStatements * 100).toFixed(2) : '100.00';
              const globalBranchPct = totalBranches > 0 ? (coveredBranches / totalBranches * 100).toFixed(2) : '100.00';
              const globalFuncPct = totalFunctions > 0 ? (coveredFunctions / totalFunctions * 100).toFixed(2) : '100.00';
              const globalLinePct = totalLines > 0 ? (coveredLines / totalLines * 100).toFixed(2) : '100.00';
              
              console.log('#### 📊 Couverture Globale');
              console.log('');
              console.log('| Métrique | Couverture |');
              console.log('|----------|------------|');
              console.log(\`| 📝 Statements | \${globalStmtPct}% (\${coveredStatements}/\${totalStatements}) |\`);
              console.log(\`| 🌿 Branches | \${globalBranchPct}% (\${coveredBranches}/\${totalBranches}) |\`);
              console.log(\`| ⚡ Functions | \${globalFuncPct}% (\${coveredFunctions}/\${totalFunctions}) |\`);
              console.log(\`| 📄 Lines | \${globalLinePct}% (\${coveredLines}/\${totalLines}) |\`);
              console.log('');
              console.log('#### 📁 Détails par Fichier');
              console.log('');
              console.log('| Fichier | Statements | Branches | Functions | Lines |');
              console.log('|---------|------------|----------|-----------|-------|');
              
              fileStats
                .sort((a, b) => parseFloat(a.stmtPct) - parseFloat(b.stmtPct))
                .forEach(stat => {
                  const stmtEmoji = parseFloat(stat.stmtPct) >= 80 ? '✅' : parseFloat(stat.stmtPct) >= 50 ? '⚠️' : '❌';
                  console.log(\`| \${stat.fileName} | \${stmtEmoji} \${stat.stmtPct}% | \${stat.branchPct}% | \${stat.funcPct}% | \${stat.linePct}% |\`);
                });
            " >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Données de couverture non générées**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "📦 **Téléchargez le rapport HTML complet** depuis les artifacts ci-dessous pour voir la couverture ligne par ligne" >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Étape 8 : Sauvegarde du rapport de couverture
      # -----------------------------------------------------------------------
      # Upload le dossier coverage/ comme artifact pour permettre de télécharger
      # et consulter le rapport HTML détaillé
      # S'exécute toujours, même si les tests échouent
      - name: Upload de l'artifact de couverture
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30  # Conservé pendant 30 jours

      # -----------------------------------------------------------------------
      # Étape 9 : Publication sur GitHub Pages (master uniquement)
      # -----------------------------------------------------------------------
      # Publie le rapport de couverture sur GitHub Pages pour un accès facile
      # Uniquement pour la branche master et si toutes les étapes précédentes
      # ont réussi
      - name: Déployer la couverture sur GitHub Pages
        if: github.ref == 'refs/heads/master' && success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage
          destination_dir: coverage  # Publié sous /coverage sur GitHub Pages
